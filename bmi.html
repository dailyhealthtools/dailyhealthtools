<!DOCTYPE html>
<html>
<head>
  <title>BMI 계산기</title>
  <meta charset="utf-8">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f7fa;
      padding: 30px;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>📊 BMI 계산기</h1>

  <p>키 (cm)</p>
  <input type="number" id="height">

  <p>몸무게 (kg)</p>
  <input type="number" id="weight">

  <br><br>
  <button onclick="calc()">계산하기</button>

  <h2 id="result"></h2>
</div>

<script>
function calc() {
  let h = document.getElementById("height").value / 100;
  let w = document.getElementById("weight").value;

  let bmi = w / (h * h);
  bmi = bmi.toFixed(1);

  let status = "";

  if (bmi < 18.5) status = "저체중";
  else if (bmi < 23) status = "정상";
  else if (bmi < 25) status = "과체중";
  else status = "비만";

  document.getElementById("result").innerText =
    "BMI: " + bmi + " (" + status + ")";
}
</script>

<br><br>
<a href="index.html">← 메인으로</a>

<hr>

<h2>BMI란?</h2>
<p>
BMI(체질량지수)는 키와 몸무게를 이용해 비만도를 평가하는 지표입니다.
체중(kg)을 키(m)의 제곱으로 나누어 계산하며, 간단하지만 전 세계적으로 널리 사용되는 건강 지표입니다.
</p>

<p>
일반적으로 BMI 수치가 18.5 미만이면 저체중, 18.5~24.9는 정상, 25 이상은 과체중,
30 이상은 비만으로 분류됩니다. 다만 근육량이 많은 경우에는 BMI가 높게 나올 수 있어 참고용으로 활용하는 것이 좋습니다.
</p>
  
</body>
</html>
